<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desplugados - Detalhes da Atividade</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-child"></i> Desplugados</h1>
            <p class="subtitle">Detalhes da atividade</p>
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Voltar para lista
            </a>
        </header>

        <main id="activity-details">
            <div class="loading" id="loading">
                <i class="fas fa-spinner fa-spin"></i> Carregando atividade...
            </div>
            
            <div class="activity-detail-container" id="activity-container" style="display: none;">
                <!-- Conteúdo será preenchido por JavaScript -->
            </div>
            
            <div class="not-found" id="not-found" style="display: none;">
                <div class="no-results">
                    <i class="fas fa-exclamation-circle"></i>
                    <h3>Atividade não encontrada</h3>
                    <p>A atividade que você está procurando não existe ou foi removida.</p>
                    <a href="index.html" class="view-btn" style="display: inline-block; margin-top: 20px;">
                        <i class="fas fa-home"></i> Voltar para a lista
                    </a>
                </div>
            </div>
        </main>

        <footer>
            <p>Desenvolvido com <i class="fas fa-heart"></i> para pais e educadores</p>
            <p>Dados do projeto Desplugados | <a href="https://github.com/botfredes/desplugados-atividades" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <script src="data/atividades.js"></script>
    <script src="activity.js"></script>
</body>
</html>
